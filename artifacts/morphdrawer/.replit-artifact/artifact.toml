kind = "web"
previewPath = "/"
title = "MORPHDRAWER"
version = "1.0.0"
id = "artifacts/morphdrawer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25141

[services.development]
run = "pnpm --filter @workspace/morphdrawer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/morphdrawer", "run", "build" ]
publicDir = "artifacts/morphdrawer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25141"
BASE_PATH = "/"
